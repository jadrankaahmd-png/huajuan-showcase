<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 樱花 - 透明背景 -->
  <defs>
    <linearGradient id="petalGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fce4ec;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f8bbd0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="centerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff9c4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffeb3b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 五个花瓣 -->
  <g transform="translate(256, 256)">
    <!-- 花瓣1 -->
    <ellipse cx="0" cy="-120" rx="50" ry="100" fill="url(#petalGradient)" transform="rotate(0)"/>
    <!-- 花瓣2 -->
    <ellipse cx="0" cy="-120" rx="50" ry="100" fill="url(#petalGradient)" transform="rotate(72)"/>
    <!-- 花瓣3 -->
    <ellipse cx="0" cy="-120" rx="50" ry="100" fill="url(#petalGradient)" transform="rotate(144)"/>
    <!-- 花瓣4 -->
    <ellipse cx="0" cy="-120" rx="50" ry="100" fill="url(#petalGradient)" transform="rotate(216)"/>
    <!-- 花瓣5 -->
    <ellipse cx="0" cy="-120" rx="50" ry="100" fill="url(#petalGradient)" transform="rotate(288)"/>
    
    <!-- 花蕊 -->
    <circle cx="0" cy="0" r="60" fill="url(#centerGradient)"/>
    
    <!-- 花蕊细节 -->
    <circle cx="-15" cy="-15" r="8" fill="#f57f17"/>
    <circle cx="15" cy="-15" r="8" fill="#f57f17"/>
    <circle cx="0" cy="15" r="8" fill="#f57f17"/>
    <circle cx="-20" cy="10" r="6" fill="#f57f17"/>
    <circle cx="20" cy="10" r="6" fill="#f57f17"/>
  </g>
</svg>
