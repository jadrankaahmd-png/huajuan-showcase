# 监控配置
monitor_config:
  check_interval: 3600  # 每小时检查一次
  max_tweets_per_kol: 10  # 每位KOL最多获取10条
  data_retention_days: 30  # 数据保留30天
  
# 关键词监控（用于情绪分析）
keywords:
  bullish: ["buy", "bullish", "upgrade", "outperform", "strong", "growth", "breakthrough", "innovation"]
  bearish: ["sell", "bearish", "downgrade", "underperform", "weak", "decline", "risk", "concern"]
  stocks: ["NVDA", "TSM", "AMD", "INTC", "AAPL", "MSFT", "GOOGL", "TSLA", "AMZN", "META"]
  sectors: ["AI", "semiconductor", "chip", "GPU", "HBM", "crypto", "bitcoin", "ethereum"]
